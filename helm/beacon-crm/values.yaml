# -- Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# -- Backend (FastAPI)
backend:
  image:
    repository: beacon-crm/backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8000
  # Right-sized to observed prod usage (~5m CPU, ~290Mi). CPU request is the
  # node-cost lever; mem limit keeps ~2x headroom to avoid OOM.
  resources:
    requests:
      cpu: 100m
      memory: 320Mi
    limits:
      cpu: "1"
      memory: 640Mi
  env:
    ENVIRONMENT: production
    JWT_EXPIRE_MINUTES: "1440"
    CLAUDE_MODEL_SIMPLE: claude-haiku-4-5-20251001
    CLAUDE_MODEL_STANDARD: claude-sonnet-4-20250514
    CLAUDE_MODEL_COMPLEX: claude-opus-4-6
    RESEND_FROM_EMAIL: onboarding@resend.dev
    QDRANT_URL: "http://qdrant.qdrant.svc.cluster.local:6333"

# -- Celery Worker
worker:
  image:
    repository: beacon-crm/backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  # Right-sized to observed prod usage (~44m CPU, ~190Mi); generous mem limit
  # for heavy tasks (transcription, enrichment, report generation).
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 640Mi

# -- Celery Beat (scheduler)
beat:
  image:
    repository: beacon-crm/backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  # Scheduler only — negligible usage (~0m CPU, ~84Mi).
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- Frontend (React + Nginx)
frontend:
  image:
    repository: beacon-crm/frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  # Nginx serving static assets — tiny (~1m CPU, ~6Mi).
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- PostgreSQL
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  port: 5432
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Redis
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Ingress
ingress:
  enabled: false
  className: nginx
  host: beacon.example.com
  tls:
    enabled: false
    secretName: beacon-tls
  annotations: {}

# -- Secrets (override these at deploy time via --set or a secrets values file)
secrets:
  dbUser: beacon
  dbPassword: change_me_in_production
  dbName: beacon_crm
  secretKey: change_me_in_production
  jwtSecret: change_me_in_production
  googleClientId: ""
  googleClientSecret: ""
  apolloApiKey: ""
  hunterApiKey: ""
  builtwithApiKey: ""
  instantlyApiKey: ""
  firefliesApiKey: ""
  newsApiKey: ""
  anthropicApiKey: ""
  claudeApiKey: ""
  resendApiKey: ""
  openaiApiKey: ""
