server {
  # Port 8080, not 80: the runtime image is nginxinc/nginx-unprivileged, which
  # runs as a non-root user that cannot bind privileged ports (<1024). The Helm
  # frontend container port, Service targetPort, and probes must all use 8080.
  listen 8080;
  server_name _;

  client_max_body_size 50M;

  # Compress text assets — JS/CSS bundles shrink dramatically over the wire.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  root /usr/share/nginx/html;
  index index.html;



  # Hashed asset files — safe to cache forever because filename changes on every build.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html must never be cached so new JS bundles are picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # SPA fallback — serves index.html for all frontend routes so
  # client-side routing (React Router) works on refresh/direct navigation.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
